<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>
  <!-- Shield shape -->
  <path d="M16 4 L26 8 L26 17 C26 22.5 21.5 27 16 29 C10.5 27 6 22.5 6 17 L6 8 Z"
        fill="url(#shieldGrad)" opacity="0.15" filter="url(#glow)"/>
  <path d="M16 4 L26 8 L26 17 C26 22.5 21.5 27 16 29 C10.5 27 6 22.5 6 17 L6 8 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Checkmark inside shield -->
  <polyline points="11,16 14.5,19.5 21,12.5"
            fill="none" stroke="#60a5fa" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
